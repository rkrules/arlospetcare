<!DOCTYPE html>
<html lang="en" data-theme="nord">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arlo's Pet Care - Coming Soon</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { font-family: 'Nunito', sans-serif; }
        h1, h2, h3 { font-family: 'Lora', serif; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-base-200">
    <div class="text-center px-6 max-w-xl mx-auto">

        <!-- Paw icon -->
        <div class="text-primary text-7xl mb-6">
            <i class="fa-solid fa-paw"></i>
        </div>

        <!-- Brand name -->
        <h1 class="text-4xl md:text-5xl font-bold text-base-content mb-3">
            Arlo's Pet Care
        </h1>

        <p class="text-xl text-base-content/70 mb-6 italic">
            Loving Pet Care You Can Trust
        </p>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Coming soon message -->
        <h2 class="text-2xl font-semibold text-base-content mb-4">
            Something great is on its way
        </h2>
        <p class="text-base-content/60 text-lg mb-8">
            We're putting the finishing touches on our new site.<br>
            Check back soon!
        </p>

        <!-- Contact nudge -->
        <p class="text-base-content/50 text-sm">
            Need care for your pet right now?<br>
            <a href="mailto:hello@arlospetcare.com" class="link link-primary font-semibold">
                hello@arlospetcare.com
            </a>
        </p>

    </div>
</body>
</html>
